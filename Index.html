<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة الفعاليّات</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }

        @keyframes modalEnter {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes overlayEnter {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-modal {
            animation: modalEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-overlay {
            animation: overlayEnter 0.3s ease-out forwards;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Hide modal by default */
        #modal-container {
            display: none;
        }

        /* Prevent overscroll bounce on mobile */
        body {
            overscroll-behavior-y: none;
        }
    </style>
</head>
<body class="min-h-[100dvh] bg-slate-50 text-slate-900">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-md">
                    <i data-lucide="map" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 tracking-tight">خريطة الفعاليّات</h1>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16">
        <div class="mb-12 text-center max-w-2xl mx-auto px-4">
            <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-4 leading-tight">
                استكشف عالم الفعاليّات
            </h2>
            <p class="text-lg text-slate-600 leading-relaxed">
                تصفح المجالات المختلفة وتعرّف على الأنشطة والفعاليّات المتنوعة المتاحة للجميع. اختر بطاقة لعرض التفاصيل.
            </p>
        </div>

        <!-- Interactive Cards Grid -->
        <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
            <!-- Cards will be injected here by JavaScript -->
        </div>
    </main>

    <!-- Details Modal -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center sm:p-6 md:p-12">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-overlay cursor-pointer" onclick="closeModal()"></div>
        
        <!-- Modal Content (Full screen on mobile, rounded on larger screens) -->
        <div id="modal-content" class="relative bg-white sm:rounded-[2rem] w-full h-[100dvh] sm:h-auto max-w-4xl sm:max-h-full overflow-hidden shadow-2xl flex flex-col animate-modal">
            <!-- Modal header and body will be injected here -->
        </div>
    </div>

    <script>
        // Data Structure
        const categories = [
            {
                id: 1,
                title: "الصحة والرياضة",
                image: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&w=800&q=80",
                icon: "activity",
                overlayColor: "from-emerald-900/95 via-emerald-800/70 to-emerald-900/30",
                themeColor: "text-emerald-500",
                themeBg: "bg-emerald-500",
                content: [
                    { 
                        title: "الأنشطة الصحية والرياضية", 
                        items: ["الرياضات البدنية / العقلية", "الصحة النفسيّة", "الرياضات الإلكترونية"] 
                    }
                ]
            },
            {
                id: 2,
                title: "الفعاليّات الإبداعيّة والروحانيّة",
                image: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=800&q=80",
                icon: "palette",
                overlayColor: "from-purple-900/95 via-purple-800/70 to-purple-900/30",
                themeColor: "text-purple-500",
                themeBg: "bg-purple-500",
                content: [
                    { 
                        title: "الفن", 
                        items: ["الموسيقى والغناء", "الرسم والفن التشكيلي", "المسرح، التمثيل، وصناعة الأفلام", "صناعة المحتوى", "الفنون الرقميّة"] 
                    },
                    { 
                        title: "الفعاليّات الروحانيّة", 
                        items: ["الفكر والفلسفة الدينيّة.", "الممارسات الدينيّة المختلفة."] 
                    }
                ]
            },
            {
                id: 3,
                title: "التكنولوجيا والابتكار",
                image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80",
                icon: "cpu",
                overlayColor: "from-blue-900/95 via-blue-800/70 to-blue-900/30",
                themeColor: "text-blue-500",
                themeBg: "bg-blue-500",
                content: [
                    { 
                        title: "الابتكار والتطوير التقني", 
                        items: ["ريادة الأعمال", "الذكاء الصنعي وتقنيات المستقبل", "البرمجة", "فعاليّات الابتكار الرقمي والإلكتروني"] 
                    }
                ]
            },
            {
                id: 4,
                title: "الدعم الأكاديمي والعلمي",
                image: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=800&q=80",
                icon: "book-open",
                overlayColor: "from-orange-900/95 via-orange-800/70 to-orange-900/30",
                themeColor: "text-orange-500",
                themeBg: "bg-orange-500",
                content: [
                    { 
                        title: "التطوير العلمي والأكاديمي", 
                        items: ["الفعاليّات التخصصية (فعاليّات مميّزة لكل كليّة أو فرع)", "الخطابة والمناظرات", "التعلّم وكيفيّة التعلّم", "فعالّيات تعريفيّة لطلاّب الثانويّة."] 
                    }
                ]
            },
            {
                id: 5,
                title: "الفعاليّات الخاصة بمجتمع Domains",
                image: "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=800&q=80",
                icon: "users",
                overlayColor: "from-rose-900/95 via-rose-800/70 to-rose-900/30",
                themeColor: "text-rose-500",
                themeBg: "bg-rose-500",
                content: [
                    { 
                        title: "أنشطة المجتمع", 
                        items: ["ألعاب تفاعليّة", "فعاليّات مجتمعية / تطوعيّة", "احتفالات داخليّة", "فعاليّات المنتسبين الجدد", "المخيّم السنوي"] 
                    }
                ]
            }
        ];

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderCards();
            lucide.createIcons(); // Render initial icons
        });

        // Render the main grid of cards
        function renderCards() {
            const grid = document.getElementById('cards-grid');
            let html = '';

            categories.forEach((category, index) => {
                const isWide = index === 0 || index === 3;
                const colSpanClass = isWide ? 'lg:col-span-2 md:col-span-2' : 'col-span-1';

                html += `
                    <div onclick="openModal(${category.id})" class="${colSpanClass} h-72 sm:h-80 relative w-full rounded-3xl overflow-hidden cursor-pointer group shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1.5 active:scale-95">
                        <img src="${category.image}" alt="${category.title}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                        <div class="absolute inset-0 bg-gradient-to-t ${category.overlayColor} opacity-90 group-hover:opacity-100 transition-opacity duration-300"></div>
                        
                        <div class="absolute inset-0 p-6 sm:p-8 flex flex-col justify-end">
                            <div class="bg-white/20 backdrop-blur-md w-14 h-14 rounded-2xl flex items-center justify-center mb-5 group-hover:-translate-y-2 transition-transform duration-300 shadow-sm border border-white/10">
                                <i data-lucide="${category.icon}" class="text-white w-7 h-7"></i>
                            </div>
                            
                            <h3 class="text-2xl sm:text-3xl font-bold text-white mb-3 group-hover:-translate-y-1 transition-transform duration-300">
                                ${category.title}
                            </h3>
                            
                            <div class="flex items-center text-white/90 opacity-0 group-hover:opacity-100 group-hover:translate-y-0 translate-y-4 transition-all duration-300">
                                <span class="text-base font-semibold">عرض التفاصيل</span>
                                <i data-lucide="chevron-left" class="w-5 h-5 mr-1"></i>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // Open and populate the modal
        function openModal(categoryId) {
            const category = categories.find(c => c.id === categoryId);
            if (!category) return;

            const modalContainer = document.getElementById('modal-container');
            const modalContent = document.getElementById('modal-content');

            // Prevent body scroll
            document.body.style.overflow = 'hidden';

            // Generate content HTML
            let contentHtml = category.content.map(section => `
                <div class="bg-white rounded-3xl p-5 sm:p-8 shadow-sm border border-slate-100/50">
                    <h4 class="text-xl sm:text-2xl font-bold text-slate-800 mb-5 sm:mb-6 flex items-center gap-3">
                        <div class="w-2.5 h-6 sm:h-8 ${category.themeBg} rounded-full"></div>
                        ${section.title}
                    </h4>
                    <ul class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-5">
                        ${section.items.map(item => `
                            <li class="flex items-start gap-3 text-slate-700 bg-slate-50 p-3 sm:p-4 rounded-2xl border border-slate-100">
                                <i data-lucide="check-circle-2" class="w-5 h-5 sm:w-6 sm:h-6 ${category.themeColor} shrink-0 mt-0.5"></i>
                                <span class="leading-relaxed text-base sm:text-lg font-medium">${item}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');

            // Set modal HTML
            modalContent.innerHTML = `
                <div class="relative h-48 sm:h-64 shrink-0">
                    <img src="${category.image}" alt="${category.title}" class="absolute inset-0 w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t ${category.overlayColor} opacity-95"></div>
                    
                    <button onclick="closeModal()" class="absolute top-4 sm:top-6 left-4 sm:left-6 bg-white/20 hover:bg-white/40 backdrop-blur-md text-white p-2.5 rounded-full transition-colors z-10" aria-label="إغلاق">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                    
                    <div class="absolute bottom-0 w-full p-6 sm:p-10 flex items-center gap-4 sm:gap-5">
                        <div class="bg-white/20 backdrop-blur-md p-3 sm:p-4 rounded-2xl border border-white/20 shadow-sm hidden sm:block">
                            <i data-lucide="${category.icon}" class="text-white w-8 h-8 sm:w-10 sm:h-10"></i>
                        </div>
                        <h2 class="text-2xl sm:text-4xl lg:text-5xl font-bold text-white leading-tight">
                            ${category.title}
                        </h2>
                    </div>
                </div>
                <div class="overflow-y-auto p-4 sm:p-10 bg-slate-50 flex-1 overscroll-contain">
                    <div class="space-y-4 sm:space-y-6">
                        ${contentHtml}
                    </div>
                </div>
            `;

            // Show modal and re-render icons inside it
            modalContainer.style.display = 'flex';
            lucide.createIcons();
        }

        // Close the modal
        function closeModal() {
            const modalContainer = document.getElementById('modal-container');
            modalContainer.style.display = 'none';
            document.body.style.overflow = 'unset'; // Restore body scroll
        }
    </script>
</body>
</html>
