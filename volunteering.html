<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domains | محطة التطوع</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --domain-blue: #0616C4;
            --deep-ocean: #00175A;
            --knowledge-purple: #4B2B6C;
            --soft-violet: #8042EB;
            --text-light: #ffffff;
            --text-muted: #e5e7eb;
            --coral-spark: #FB6B48; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, var(--deep-ocean), var(--knowledge-purple), var(--domain-blue), var(--deep-ocean));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        nav {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            transition: opacity 0.3s;
        }
        nav a:hover { opacity: 1; }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            width: 350px;
            margin-top: 40px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        /* Entrance Animation */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-item {
            animation: slideUpFade 0.8s ease-out forwards;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-light);
        }

        h2 {
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 20px;
            color: var(--coral-spark);
        }

        p {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 2px;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: normal;
            font-weight: 400;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--coral-spark);
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            background-color: var(--domain-blue);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(6, 22, 196, 0.4);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--soft-violet);
        }

        button:active {
            transform: scale(0.97);
        }

        /* The Jumping Animation Magic */
        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); } /* This pulls the text UP 20 pixels */
        }

        .jumping-text {
            display: inline-block;
            animation: jump 0.6s ease infinite; /* Loops the jump animation forever */
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--coral-spark);
            margin: 20px 0;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">البداية</a>
        <a href="volunteering.html">التطوع</a>
        <a href="clubs.html">الأندية</a>
    </nav>

    <div id="lock-screen" class="container animate-item">
        <h1 id="greeting">مرحباً</h1>
        <h2>محطة التطوع</h2>
        <p>توجه نحو محطة التطوع في القاعة. ابحث عن الكلمة السرية المخفية لتتمكن من الدخول إلى هذا القسم وإكمال رحلتك.</p>
        
        <input type="text" id="secretCodeInput" placeholder="أدخل الكلمة السرية" required>
        <button onclick="checkCode()">افتح المحطة</button>
    </div>

    <div id="unlocked-screen" class="container hidden">
        <h1>تم الفتح بنجاح!</h1>
        
        <div class="jumping-text">I love Eyad and Tareq Hloubi! 🎉</div>
        
        <p>هذا مجرد اختبار! سنقوم بوضع المحتوى الحقيقي هنا لاحقاً.</p>
        
        <button onclick="window.location.href='clubs.html'" style="background-color: var(--coral-spark);">المحطة التالية: الأندية</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const visitorName = localStorage.getItem('domainsVisitorName');
            if (visitorName) {
                document.getElementById('greeting').innerText = "مرحباً يا " + visitorName;
            }
        });

        function checkCode() {
            const input = document.getElementById('secretCodeInput').value.trim().toUpperCase();
            
            if (input === "IMPACT") {
                document.getElementById('lock-screen').classList.add('hidden');
                
                const unlockedScreen = document.getElementById('unlocked-screen');
                unlockedScreen.classList.remove('hidden');
                unlockedScreen.classList.add('animate-item');
            } else {
                alert("الكلمة السرية غير صحيحة. ابحث جيداً حول المحطة!");
            }
        }

        document.getElementById("secretCodeInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkCode();
            }
        });
    </script>
</body>
</html>
